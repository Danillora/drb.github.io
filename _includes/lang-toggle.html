<style>
  #lang-fab {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    z-index: 9999;
    display: inline-flex;
    align-items: center;
    gap: 0.4em;
    font-family: inherit;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #fff;
    text-decoration: none;
    background: #2c3e50;
    border: none;
    border-radius: 50px;
    padding: 0.6em 1.1em;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(0,0,0,0.25);
    transition: background 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
  }

  #lang-fab:hover {
    background: #1a252f;
    box-shadow: 0 6px 20px rgba(0,0,0,0.32);
    transform: translateY(-2px);
  }

  #lang-fab:active {
    transform: scale(0.95) translateY(0);
  }

  #lang-fab .lang-flag {
    font-size: 1.1em;
    line-height: 1;
  }

  @keyframes lang-pulse {
    0%   { box-shadow: 0 4px 14px rgba(0,0,0,0.25), 0 0 0 0 rgba(44,62,80,0.5); }
    70%  { box-shadow: 0 4px 14px rgba(0,0,0,0.25), 0 0 0 10px rgba(44,62,80,0); }
    100% { box-shadow: 0 4px 14px rgba(0,0,0,0.25), 0 0 0 0 rgba(44,62,80,0); }
  }

  #lang-fab.lang-fab--pulse {
    animation: lang-pulse 1.2s ease 2;
  }
</style>

<button id="lang-fab" type="button" aria-label="Switch language">
  <span class="lang-flag" id="lang-fab-flag">🇧🇷</span>
  <span id="lang-fab-label">PT</span>
</button>
